<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Join | MineSkull</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo bungee serverName"></div>
        <div class="nav-links"><a href="index.html">Home</a><a href="features.html">Features</a><a href="team.html">Team</a><a href="join.html" style="color: var(--primary)">Join</a></div>
    </nav>
    <div class="container" style="max-width: 900px;">
        <h1 class="bungee" style="text-align: center; margin-bottom: 2rem;">How to <span style="color: var(--primary)">Connect</span></h1>
        <div class="card">
            <div style="font-size: 1.4rem; line-height: 2;">
                <p>1. Launch Minecraft <strong><span class="version"></span></strong></p>
                <p>2. Select <strong>Multiplayer</strong></p>
                <p>3. Click <strong>Add Server</strong></p>
                <p>4. Type <span class="serverIP" style="color: var(--primary)"></span> in Server Address</p>
                <p>5. Click <strong>Done</strong> and Join!</p>
            </div>
            <div style="text-align: center; margin-top: 3rem;">
                <button class="btn btn-yellow" onclick="copyIP()">COPY IP ADDRESS</button>
            </div>
        </div>
    </div>
    <script src="config.js"></script><script src="script.js"></script>
</body>
</html>
